command:
  - uvicorn
  - "backend.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: CATALOG
    value: jmr_demo
  - name: SCHEMA_NAME
    value: zerobus
  - name: SQL_WAREHOUSE_ID
    value: 5067b513037fbf07
  - name: LAKEBASE_PROJECT_ID
    value: claudit-otel
  - name: LAKEBASE_BRANCH
    value: production
  - name: LAKEBASE_ENDPOINT
    value: primary
  - name: LAKEBASE_DATABASE
    value: claudit
