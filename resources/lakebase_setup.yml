resources:
  jobs:
    lakebase_setup:
      name: claudit-lakebase-setup
      description: "Provisions Lakebase project, syncs OTEL tables, grants SP access"
      tasks:
        - task_key: setup
          notebook_task:
            notebook_path: ../src/notebooks/lakebase_setup.py
            base_parameters:
              catalog: ${var.catalog}
              lakebase_project: ${var.lakebase_project}
              lakebase_branch: ${var.lakebase_branch}
              lakebase_endpoint: ${var.lakebase_endpoint}
              lakebase_database: ${var.lakebase_database}
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 0
            spark_conf:
              "spark.databricks.cluster.profile": "singleNode"
              "spark.master": "local[*]"
