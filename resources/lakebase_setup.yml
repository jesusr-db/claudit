resources:
  jobs:
    lakebase_setup:
      name: claudit-lakebase-setup
      description: "Creates PG views, materialized views, indexes, and grants SP access for Lakebase"
      tags:
        app: claudit
      tasks:
        - task_key: setup_pg_objects
          notebook_task:
            notebook_path: ../src/notebooks/lakebase_setup.py
            base_parameters:
              catalog: ${var.catalog}
              lakebase_instance: ${var.lakebase_instance}
              lakebase_database: ${var.lakebase_database}
              app_name: claudit-observability
              pipeline_name: ${resources.pipelines.lakebase_sync.name}
