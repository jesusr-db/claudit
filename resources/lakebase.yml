resources:
  database_instances:
    lakebase_instance:
      name: ${var.lakebase_instance}
      capacity: CU_1

  # NOTE: synced_database_tables are NOT managed by DAB because their source
  # tables (materialized views) are created at runtime by the lakebase_sync
  # pipeline. Synced tables are created/destroyed by the lakebase_setup and
  # lakebase_teardown jobs respectively.
