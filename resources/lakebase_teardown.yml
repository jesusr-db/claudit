resources:
  jobs:
    lakebase_teardown:
      name: claudit-lakebase-teardown
      description: "Removes Lakebase PG artifacts not managed by DAB (views, materialized views, indexes)"
      tags:
        app: claudit
      tasks:
        - task_key: teardown
          notebook_task:
            notebook_path: ../src/notebooks/lakebase_teardown.py
            base_parameters:
              catalog: ${var.catalog}
              lakebase_instance: ${var.lakebase_instance}
              lakebase_database: ${var.lakebase_database}
              delete_instance: "no"
