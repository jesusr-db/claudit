resources:
  pipelines:
    lakebase_sync:
      name: claudit-lakebase-sync
      catalog: ${var.catalog}
      schema: zerobus_sdp
      libraries:
        - file:
            path: ../src/pipelines/lakebase_sync/otel_logs_pg.sql
        - file:
            path: ../src/pipelines/lakebase_sync/otel_metrics_pg.sql
        - file:
            path: ../src/pipelines/lakebase_sync/otel_spans_pg.sql
      configuration:
        source_catalog: ${var.catalog}
        source_schema: ${var.schema}
      development: true
      serverless: true

  jobs:
    lakebase_sync_scheduled:
      name: claudit-lakebase-sync-scheduled
      description: "Runs the Lakebase sync pipeline every 15 minutes to keep OTEL data fresh"
      tags:
        app: claudit
      schedule:
        quartz_cron_expression: "0 0/15 * * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      tasks:
        - task_key: sync
          pipeline_task:
            pipeline_id: ${resources.pipelines.lakebase_sync.id}
