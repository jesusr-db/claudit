resources:
  pipelines:
    lakebase_sync:
      name: claudit-lakebase-sync
      catalog: ${var.catalog}
      schema: zerobus_sdp
      libraries:
        - file:
            path: ../src/pipelines/lakebase_sync/otel_logs_pg.sql
        - file:
            path: ../src/pipelines/lakebase_sync/otel_metrics_pg.sql
        - file:
            path: ../src/pipelines/lakebase_sync/otel_spans_pg.sql
        - file:
            path: ../src/pipelines/lakebase_sync/cc_logs.sql
        - file:
            path: ../src/pipelines/lakebase_sync/cc_spans.sql
      configuration:
        source_catalog: ${var.catalog}
        source_schema: ${var.schema}
      development: false
      serverless: true

  jobs:
    lakebase_sync_scheduled:
      name: claudit-lakebase-sync-scheduled
      description: "Runs the Lakebase sync pipeline every 15 minutes to keep OTEL data fresh"
      tags:
        app: claudit
      schedule:
        quartz_cron_expression: "0 0/15 * * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      tasks:
        - task_key: sync
          pipeline_task:
            pipeline_id: ${resources.pipelines.lakebase_sync.id}
            full_refresh: true
        - task_key: refresh_synced_tables
          depends_on:
            - task_key: sync
          notebook_task:
            notebook_path: ../src/notebooks/refresh_synced_tables.py
            base_parameters:
              catalog: ${var.catalog}
