bundle:
  name: claudit-observability

include:
  - resources/*.yml

variables:
  catalog:
    description: "Unity Catalog containing OTEL tables"
    default: vdm_classic_rikfy0_catalog
  schema:
    description: "Schema containing OTEL tables"
    default: zerobus
  warehouse_id:
    description: "SQL Warehouse ID for app queries"
  lakebase_project:
    description: "Lakebase project ID for OTEL data"
    default: claudit-otel
  lakebase_branch:
    description: "Lakebase branch for OTEL data"
    default: production
  lakebase_endpoint:
    description: "Lakebase endpoint for OTEL data"
    default: primary
  lakebase_database:
    description: "Lakebase database for OTEL data"
    default: claudit

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: DEFAULT
    variables:
      catalog: vdm_classic_rikfy0_catalog
      schema: zerobus
      warehouse_id: 5067b513037fbf07
      lakebase_project: claudit-otel
      lakebase_branch: production
      lakebase_endpoint: primary
      lakebase_database: claudit

  prod:
    mode: production
    workspace:
      profile: DEFAULT
    variables:
      catalog: jmr_demo
      schema: zerobus
