bundle:
  name: claudit-observability

include:
  - resources/*.yml

variables:
  catalog:
    description: "Unity Catalog containing OTEL tables"
    default: vdm_classic_rikfy0_catalog
  schema:
    description: "Schema containing OTEL tables"
    default: zerobus
  warehouse_id:
    description: "SQL Warehouse ID for app queries"
  lakebase_instance:
    description: "Lakebase Provisioned instance name"
    default: claudit-db
  lakebase_database:
    description: "Lakebase database for OTEL data"
    default: databricks_postgres

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: DEFAULT
    variables:
      catalog: vdm_classic_rikfy0_catalog
      schema: zerobus
      warehouse_id: 5067b513037fbf07
      lakebase_instance: claudit-db
      lakebase_database: databricks_postgres

  prod:
    mode: production
    workspace:
      profile: DEFAULT
    variables:
      catalog: jmr_demo
      schema: zerobus
