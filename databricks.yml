bundle:
  name: claudit-observability

include:
  - resources/*.yml

variables:
  catalog:
    description: "Unity Catalog containing OTEL tables"
    default: jmr_demo
  schema:
    description: "Schema containing OTEL tables"
    default: zerobus
  warehouse_id:
    description: "SQL Warehouse ID for app queries"

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: DEFAULT
    variables:
      catalog: jmr_demo
      schema: zerobus
      warehouse_id: 5067b513037fbf07

  prod:
    mode: production
    workspace:
      profile: DEFAULT
    variables:
      catalog: jmr_demo
      schema: zerobus
